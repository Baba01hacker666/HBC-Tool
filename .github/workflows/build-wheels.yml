name: Build Distributions

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: pp* *-musllinux_* *-win32 *_i686
          CIBW_ARCHS_MACOS: x86_64 arm64
          CIBW_TEST_COMMAND: python -c "import hbctool, hbctool.metadata; import hbctool._fastutil; import hbctool._bitcodec; print(hbctool.metadata.version)"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - sdist
      - wheels
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist

      - name: Download Linux wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-wheels-ubuntu-latest
          path: dist

      - name: Download macOS wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-wheels-macos-latest
          path: dist

      - name: Download Windows wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-wheels-windows-latest
          path: dist

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
